<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kosh Specs — Live Collaboration</title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles/docs.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Left Sidebar: Documents Explorer -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"></div>
        <span class="brand-title">Kosh</span>
      </div>
      <div class="sidebar-content">
        <button class="btn primary" id="btnAddNewDoc" style="width: 100%; margin-bottom: 16px; justify-content: center;">
          + New Specification
        </button>
        
        <div class="section-label">Space Documents</div>
        <ul class="doc-tree" id="docTree">
          <!-- Populated by JS -->
        </ul>
      </div>
    </aside>
    
    <!-- Main Document Canvas -->
    <main class="workspace">
      
      <!-- Top Action Bar -->
      <header class="topbar">
        <div class="breadcrumbs">
          <span>Specs</span>
          <span>/</span>
          <span class="crumb-active">Portfolio Alpha Metrics API</span>
        </div>
        
        <div class="controls-cluster">
          <!-- View Modes -->
          <div class="panel-tabs">
            <button class="panel-tab active" id="tabEdit">Edit Draft</button>
            <button class="panel-tab" id="tabRead">Reader View</button>
            <button class="panel-tab" id="tabDiff">Review Diffs</button>
          </div>
          
          <!-- Identity Badges -->
          <div class="identity-badge">
            <div class="user-avatar-circle" id="user-avatar">AK</div>
            <input type="text" id="author-input" placeholder="Your name" autocomplete="off" spellcheck="false">
          </div>
          
          <button class="btn primary" id="btnCreateVersion">
            Commit Version
          </button>
        </div>
      </header>
      
      <!-- Scrollable Document Guts -->
      <div class="doc-scroller" id="docScroller">
        
        <!-- Textarea Editor View -->
        <div class="doc-width-limiter" id="docEditorView" style="display: block;">
          <input type="text" id="docTitleInput" class="doc-title-editor" style="width: 100%; background: transparent; border: none; outline: none; font-size: 32px; font-family: var(--font-serif); font-weight: 600; color: var(--text-hi); margin-bottom: 16px;" placeholder="Document Title...">
          <textarea id="docEditorTextarea" style="width: 100%; min-height: calc(100vh - 280px); background: transparent; border: none; outline: none; font-size: 15px; line-height: 1.7; color: var(--text); font-family: var(--font-sans); resize: none;" placeholder="Start writing your specification in Markdown..."></textarea>
        </div>
        
        <!-- Rendered HTML / Diffs View -->
        <div class="doc-width-limiter" id="docRenderedView" style="display: none;">
          <div id="renderedDocContainer">
            <!-- Dynamic Markdown/Diff Content goes here -->
          </div>
          
          <!-- Figma-style Floating comment pin layers -->
          <div id="comment-pin-layer"></div>
        </div>
        
      </div>
      
      <!-- Hover Selection Comments Trigger -->
      <div id="selection-toolbar">
        <button id="selectionCommentBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"></path></svg>
          Comment
        </button>
      </div>
      
    </main>
    
    <!-- Right Panel: Version Comparison Options & History -->
    <aside class="version-panel">
      <div class="version-panel-header">
        <span style="font-weight: 600; font-size: 14px; color: var(--text-hi)">Compare Version</span>
        <select id="compareVersionSelect" class="btn" style="background: var(--surface-card); font-size: 11px; border: 1px solid var(--border-strong);">
          <!-- Populated by JS -->
        </select>
      </div>
      <div class="version-list" id="versionList">
        <!-- Version history timeline cards -->
      </div>
    </aside>
    
  </div>
  
  <!-- Slide-out Gutter Panel: Comments Hub -->
  <div class="comments-panel" id="commentsPanel">
    <div class="panel-header">
      <div class="panel-tabs">
        <button class="panel-tab active" id="comments-tab-open">
          Open doubts
          <span class="panel-tab-badge" id="open-comments-count">0</span>
        </button>
        <button class="panel-tab" id="comments-tab-resolved">
          Resolved
          <span class="panel-tab-badge" id="resolved-comments-count">0</span>
        </button>
      </div>
      <button class="thread-close" id="commentsPanelCloseBtn" style="font-size: 20px;">✕</button>
    </div>
    <div class="panel-body">
      <!-- Doubt Thread List Cards -->
      <div id="open-comments-panel" style="display: block;"></div>
      <div id="resolved-comments-panel" style="display: none;"></div>
    </div>
  </div>

  <!-- Float Cluster: Comment Pane Toggle -->
  <div class="floating-toggles">
    <div class="float-btn" id="floatCommentsToggleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"></path>
      </svg>
      <div class="float-btn-badge" id="float-comments-badge" style="display: none;">0</div>
    </div>
  </div>

  <!-- Toast Notification System -->
  <div class="toast-notification" id="toastNotification">
    <div class="toast-icon">✓</div>
    <div class="toast-details">
      <div class="toast-title" id="toastTitle">Success</div>
      <div class="toast-desc" id="toastDesc">Action updated.</div>
    </div>
  </div>

  <!-- Main System Logic Module -->
  <script src="src/docs.js"></script>
</body>
</html>
